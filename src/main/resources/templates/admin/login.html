<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AfriMarket — Connexion Administrateur</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&family=Plus+Jakarta+Sans:wght@400;500;600&family=Syne+Mono&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-dark: #0D1F0D;
            --bg-main: #111F11;
            --bg-card: #162416;
            --gold: #C8973A;
            --gold-dim: rgba(200,151,58,0.15);
            --green: #4ADE80;
            --green-dim: rgba(74,222,128,0.12);
            --border: rgba(74,222,128,0.15);
            --text: #D4E8D4;
            --text-muted: rgba(74,222,128,0.6);
        }

        html, body {
            height: 100%;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            overflow: hidden;
        }

        /* Animated scanning line */
        body::before {
            content: '';
            position: fixed;
            top: -100px;
            left: 0;
            right: 0;
            height: 100px;
            background: linear-gradient(to bottom, transparent, rgba(74,222,128,0.04), transparent);
            animation: scanline 30s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes scanline {
            0% { transform: translateY(0); }
            100% { transform: translateY(calc(100vh + 100px)); }
        }

        /* Noise texture overlay */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
            z-index: 0;
        }

        .login-container {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .login-box {
            width: 100%;
            max-width: 440px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 48px 40px;
            box-shadow: 0 32px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(74,222,128,0.05);
            animation: slideUp 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
        }

        @keyframes slideUp {
            from { transform: translateY(32px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .logo {
            text-align: center;
            margin-bottom: 8px;
        }

        .logo-text {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 36px;
            color: var(--gold);
            letter-spacing: 1px;
        }

        .logo-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--green);
            border-radius: 50%;
            margin-left: 4px;
            animation: pulse 2s ease-in-out infinite;
            vertical-align: middle;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        .badge {
            display: inline-block;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-muted);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 4px 12px;
            margin-top: 8px;
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 28px 0;
        }

        .form-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 24px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-main);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(200,151,58,0.15);
        }

        input::placeholder {
            color: rgba(212,232,212,0.3);
        }

        .password-wrap {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 16px;
            padding: 4px;
        }

        .btn-login {
            width: 100%;
            padding: 15px;
            background: var(--gold);
            border: none;
            border-radius: 10px;
            color: #0D1F0D;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
            margin-top: 8px;
            letter-spacing: 0.03em;
        }

        .btn-login:hover {
            background: #D9A840;
            box-shadow: 0 8px 24px rgba(200,151,58,0.3);
            transform: translateY(-1px);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .alert-error {
            background: rgba(239,68,68,0.12);
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 13px;
            color: #FCA5A5;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .alert-success {
            background: rgba(74,222,128,0.08);
            border: 1px solid rgba(74,222,128,0.2);
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 13px;
            color: var(--green);
            margin-bottom: 20px;
        }

        .footer-note {
            text-align: center;
            font-size: 11px;
            color: rgba(212,232,212,0.3);
            margin-top: 24px;
        }

        /* Grid background */
        .grid-bg {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(74,222,128,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(74,222,128,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="login-container">
        <div class="login-box">
            <div class="logo">
                <div class="logo-text">AfriMarket<span class="logo-dot"></span></div>
                <div class="badge">⬡ Espace Administrateur</div>
            </div>

            <div class="divider"></div>

            <div class="form-title">Connexion sécurisée</div>

            <div th:if="${param.error}" class="alert-error">
                <span>⚠</span> Identifiants incorrects. Vérifiez votre nom d'utilisateur et mot de passe.
            </div>
            <div th:if="${param.logout}" class="alert-success">
                ✓ Vous avez été déconnecté avec succès.
            </div>

            <form method="post" th:action="@{/admin/login}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="form-group">
                    <label for="username">Identifiant</label>
                    <input type="text" id="username" name="username"
                           placeholder="admin" autocomplete="username" required>
                </div>

                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <div class="password-wrap">
                        <input type="password" id="password" name="password"
                               placeholder="••••••••••" autocomplete="current-password" required>
                        <button type="button" class="toggle-password" onclick="togglePwd()">👁</button>
                    </div>
                </div>

                <button type="submit" class="btn-login">
                    Connexion → Tableau de bord
                </button>
            </form>

            <p class="footer-note">AfriMarket v1.0 • Yaoundé, Cameroun • Accès restreint aux administrateurs autorisés</p>
        </div>
    </div>

    <script>
        function togglePwd() {
            const input = document.getElementById('password');
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        // Auto-focus
        document.getElementById('username').focus();
    </script>
</body>
</html>
