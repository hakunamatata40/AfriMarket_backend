<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: head('Modifier Relais')}"/>
</head>
<body>
<span id="flashSuccess" th:if="${success}" th:text="${success}" style="display:none"></span>

<div th:replace="~{fragments/layout :: sidebar('relays')}"></div>

<div class="main-area">
    <header th:replace="~{fragments/layout :: topbar('Modifier un Point Relais')}"></header>

    <div class="page-content">
        <div class="page-header">
            <div>
                <a href="/admin/relays" class="btn btn-outline btn-sm" style="margin-bottom:12px;">← Retour</a>
                <div class="page-title" th:text="'Modifier : ' + relay.name">Modifier relais</div>
            </div>
        </div>

        <div style="max-width:700px;">
            <div class="table-card">
                <div class="table-card-header">
                    <div class="table-card-title">◐ Informations du relais</div>
                </div>
                <div style="padding:28px;">
                    <form th:action="@{/admin/relays/save}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <input type="hidden" name="id" th:value="${relay.id}">

                        <div style="display:grid; grid-template-columns:1fr 1fr; gap:18px;">
                            <div>
                                <div class="detail-label">Nom du relais *</div>
                                <input type="text" name="name" th:value="${relay.name}"
                                       class="setting-input" style="width:100%; text-align:left; margin-top:6px;" required>
                            </div>
                            <div>
                                <div class="detail-label">Gérant</div>
                                <input type="text" name="managerName" th:value="${relay.managerName}"
                                       class="setting-input" style="width:100%; text-align:left; margin-top:6px;">
                            </div>
                            <div>
                                <div class="detail-label">Téléphone</div>
                                <input type="text" name="phone" th:value="${relay.phone}"
                                       class="setting-input" style="width:100%; text-align:left; margin-top:6px;">
                            </div>
                            <div>
                                <div class="detail-label">Zone</div>
                                <select name="zoneId" class="filter-select" style="width:100%; margin-top:6px;">
                                    <option value="">Sélectionner...</option>
                                    <option th:each="z : ${zones}"
                                            th:value="${z.id}"
                                            th:text="${z.name}"
                                            th:selected="${relay.zone != null and relay.zone.id == z.id}">—</option>
                                </select>
                            </div>
                            <div>
                                <div class="detail-label">Capacité (kg)</div>
                                <input type="number" name="capacityKg" th:value="${relay.capacityKg}"
                                       class="setting-input" style="width:100%; text-align:left; margin-top:6px;">
                            </div>
                            <div>
                                <div class="detail-label">Statut</div>
                                <select name="status" class="filter-select" style="width:100%; margin-top:6px;">
                                    <option value="ACTIVE"    th:selected="${relay.status?.name() == 'ACTIVE'}">ACTIVE</option>
                                    <option value="INACTIVE"  th:selected="${relay.status?.name() == 'INACTIVE'}">INACTIVE</option>
                                    <option value="SUSPENDED" th:selected="${relay.status?.name() == 'SUSPENDED'}">SUSPENDED</option>
                                </select>
                            </div>
                            <div>
                                <div class="detail-label">GPS Latitude</div>
                                <input type="number" step="0.0001" name="gpsLat" th:value="${relay.gpsLat}"
                                       class="setting-input" style="width:100%; text-align:left; margin-top:6px;">
                            </div>
                            <div>
                                <div class="detail-label">GPS Longitude</div>
                                <input type="number" step="0.0001" name="gpsLng" th:value="${relay.gpsLng}"
                                       class="setting-input" style="width:100%; text-align:left; margin-top:6px;">
                            </div>
                            <div style="grid-column:span 2;">
                                <div class="detail-label">Adresse complète</div>
                                <input type="text" name="address" th:value="${relay.address}"
                                       class="setting-input" style="width:100%; text-align:left; margin-top:6px;">
                            </div>
                        </div>

                        <div style="margin-top:24px; display:flex; justify-content:flex-end; gap:10px;">
                            <a href="/admin/relays" class="btn btn-outline">Annuler</a>
                            <button type="submit" class="btn btn-gold">Sauvegarder</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="toast-container" id="toastContainer"></div>
<th:block th:replace="~{fragments/layout :: scripts}"/>
</body>
</html>
