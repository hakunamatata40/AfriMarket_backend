<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: head('Points Relais')}"/>
</head>
<body>
<span id="flashSuccess" th:if="${success}" th:text="${success}" style="display:none"></span>

<div th:replace="~{fragments/layout :: sidebar('relays')}"></div>

<div class="main-area">
    <header th:replace="~{fragments/layout :: topbar('Gestion des Points Relais')}"></header>

    <div class="page-content">

        <div class="page-header">
            <div>
                <div class="page-title">Points Relais</div>
                <div class="page-subtitle"
                     th:text="${relays != null ? relays.size() : 0} + ' points relais enregistrés'">0 relais</div>
            </div>
            <button class="btn btn-gold" onclick="openModal('addRelayModal')">
                + Ajouter un relais
            </button>
        </div>

        <!-- Relay cards grid -->
        <div class="section-label">Réseau de distribution</div>
        <div class="relay-grid" th:if="${relays != null and !relays.empty}">
            <div th:each="relay : ${relays}" class="relay-card">
                <div class="relay-card-header">
                    <div>
                        <div class="relay-name" th:text="${relay.name}">—</div>
                        <div class="relay-manager"
                             th:text="'Gérant : ' + (relay.managerName ?: '—')">—</div>
                    </div>
                    <span th:switch="${relay.status?.name()}">
                        <span th:case="'ACTIVE'"    class="pill pill-active"><span class="pill-dot"></span>ACTIF</span>
                        <span th:case="'INACTIVE'"  class="pill pill-cancelled">INACTIF</span>
                        <span th:case="'SUSPENDED'" class="pill pill-suspended">SUSPENDU</span>
                        <span th:case="*"           class="pill pill-draft" th:text="${relay.status}">—</span>
                    </span>
                </div>

                <div class="relay-meta">
                    <div class="relay-meta-row">
                        <span>📍</span>
                        <span th:text="${relay.address ?: '—'}">—</span>
                    </div>
                    <div class="relay-meta-row" th:if="${relay.zone != null}">
                        <span>◐</span>
                        <span th:text="${relay.zone.name}">—</span>
                    </div>
                    <div class="relay-meta-row" th:if="${relay.phone != null}">
                        <span>📞</span>
                        <span class="td-mono" th:text="${relay.phone}">—</span>
                    </div>
                    <div class="relay-meta-row" th:if="${relay.capacityKg != null}">
                        <span>⬡</span>
                        <span th:text="'Capacité : ' + relay.capacityKg.intValue() + ' kg'">—</span>
                    </div>
                    <div class="relay-meta-row" th:if="${relay.gpsLat != null and relay.gpsLng != null}">
                        <span>🗺</span>
                        <span class="td-mono" style="font-size:11px;"
                              th:text="${#numbers.formatDecimal(relay.gpsLat, 1, 'COMMA', 4, 'POINT')} + ', ' + ${#numbers.formatDecimal(relay.gpsLng, 1, 'COMMA', 4, 'POINT')}">—</span>
                    </div>
                </div>

                <div style="display:flex; gap:8px; margin-top:8px; flex-wrap:wrap;">
                    <a th:href="@{/admin/relays/{id}/edit(id=${relay.id})}"
                       class="btn btn-outline btn-xs">Modifier</a>

                    <form th:action="@{/admin/relays/{id}/status(id=${relay.id})}" method="post"
                          style="display:inline;">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <input type="hidden" name="status"
                               th:value="${relay.status?.name() == 'ACTIVE' ? 'INACTIVE' : 'ACTIVE'}">
                        <button type="submit" class="btn btn-xs"
                                th:class="${relay.status?.name() == 'ACTIVE'} ? 'btn btn-xs btn-outline text-muted' : 'btn btn-xs btn-green'">
                            <span th:text="${relay.status?.name() == 'ACTIVE' ? '⏸ Désactiver' : '▶ Activer'}">—</span>
                        </button>
                    </form>

                    <form th:action="@{/admin/relays/{id}/delete(id=${relay.id})}" method="post"
                          style="display:inline;">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-xs btn-red"
                                data-confirm="Supprimer ce point relais définitivement ?">
                            🗑
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <div th:if="${relays == null or relays.empty}" class="table-card">
            <div class="empty-state">
                <div class="empty-icon">◐</div>
                <div class="empty-text">Aucun point relais configuré</div>
                <button class="btn btn-gold" onclick="openModal('addRelayModal')">+ Créer le premier relais</button>
            </div>
        </div>

        <!-- ══ TABLE VIEW ══ -->
        <div class="section-label" style="margin-top:28px;">Vue tableau</div>
        <div class="table-card">
            <div class="table-responsive">
                <table>
                    <colgroup>
                        <col style="width:55px">
                        <col style="width:160px">
                        <col style="width:130px">
                        <col style="width:120px">
                        <col style="width:130px">
                        <col style="width:80px">
                        <col style="width:90px">
                        <col style="width:110px">
                    </colgroup>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nom</th>
                            <th>Gérant</th>
                            <th>Téléphone</th>
                            <th>Zone</th>
                            <th>Cap. (kg)</th>
                            <th>Statut</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="relay : ${relays}">
                            <td class="td-mono text-muted" th:text="${relay.id}">1</td>
                            <td th:text="${relay.name}">—</td>
                            <td th:text="${relay.managerName ?: '—'}">—</td>
                            <td class="td-mono" th:text="${relay.phone ?: '—'}">—</td>
                            <td th:text="${relay.zone?.name ?: '—'}">—</td>
                            <td class="td-mono" th:text="${relay.capacityKg != null ? relay.capacityKg.intValue() : '—'}">—</td>
                            <td>
                                <span th:switch="${relay.status?.name()}">
                                    <span th:case="'ACTIVE'"    class="pill pill-active"><span class="pill-dot"></span>ACTIF</span>
                                    <span th:case="'INACTIVE'"  class="pill pill-cancelled">INACTIF</span>
                                    <span th:case="'SUSPENDED'" class="pill pill-suspended">SUSPENDU</span>
                                </span>
                            </td>
                            <td>
                                <a th:href="@{/admin/relays/{id}/edit(id=${relay.id})}"
                                   class="btn btn-outline btn-xs">Modifier →</a>
                            </td>
                        </tr>
                        <tr th:if="${relays == null or relays.empty}">
                            <td colspan="8">
                                <div class="empty-state" style="padding:30px;">
                                    <div class="empty-text">Aucun relais</div>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Add Relay Modal -->
<div class="modal-overlay" id="addRelayModal">
    <div class="modal-box" style="max-width:560px;">
        <div class="modal-title">+ Nouveau point relais</div>
        <form action="/admin/relays/save" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div style="display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:14px;">
                <div>
                    <label style="display:block; font-size:11px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-muted); margin-bottom:6px;">Nom du relais *</label>
                    <input type="text" name="name" class="setting-input" style="width:100%; text-align:left;" placeholder="Ex: Boutique Mfoundi" required>
                </div>
                <div>
                    <label style="display:block; font-size:11px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-muted); margin-bottom:6px;">Gérant</label>
                    <input type="text" name="managerName" class="setting-input" style="width:100%; text-align:left;" placeholder="Nom du gérant">
                </div>
                <div>
                    <label style="display:block; font-size:11px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-muted); margin-bottom:6px;">Téléphone</label>
                    <input type="text" name="phone" class="setting-input" style="width:100%; text-align:left;" placeholder="+237...">
                </div>
                <div>
                    <label style="display:block; font-size:11px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-muted); margin-bottom:6px;">Zone</label>
                    <select name="zoneId" class="filter-select" style="width:100%;">
                        <option value="">Sélectionner...</option>
                        <option th:each="z : ${zones}"
                                th:value="${z.id}"
                                th:text="${z.name}">—</option>
                    </select>
                </div>
                <div>
                    <label style="display:block; font-size:11px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-muted); margin-bottom:6px;">Capacité (kg)</label>
                    <input type="number" name="capacityKg" class="setting-input" style="width:100%; text-align:left;" placeholder="Ex: 200">
                </div>
                <div>
                    <label style="display:block; font-size:11px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-muted); margin-bottom:6px;">GPS Latitude</label>
                    <input type="number" step="0.0001" name="gpsLat" class="setting-input" style="width:100%; text-align:left;" placeholder="Ex: 3.8593">
                </div>
                <div style="grid-column:span 2;">
                    <label style="display:block; font-size:11px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-muted); margin-bottom:6px;">Adresse complète</label>
                    <input type="text" name="address" class="setting-input" style="width:100%; text-align:left;" placeholder="Rue, Quartier, Arrondissement">
                </div>
            </div>

            <div class="modal-actions">
                <button type="button" class="btn btn-outline" onclick="closeModal('addRelayModal')">Annuler</button>
                <button type="submit" class="btn btn-gold">Créer le relais</button>
            </div>
        </form>
    </div>
</div>

<div class="toast-container" id="toastContainer"></div>
<th:block th:replace="~{fragments/layout :: scripts}"/>
</body>
</html>
