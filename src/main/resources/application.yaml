    port: 587
    username: yanavadieudonne@gmail.com
    password: lubfuhzwjsaovkxm
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        debug: false

server:
  port: 8080
  servlet:
    context-path: /
  error:
    whitelabel:
      enabled: true
    include-message: always
    include-stacktrace: on_param

afrimarket:
